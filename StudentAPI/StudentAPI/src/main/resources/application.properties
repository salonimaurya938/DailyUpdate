
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.datasource.url=jdbc:mysql://localhost:3306/studentapi
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
server.port=8888

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.servlet.multipart.max-file-size: 128000MB
spring.servlet.multipart.max-request-size: 128000MB
spring.thymeleaf.mode=HTML5

# session configuration 
server.servlet.session.timeout= 180s
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
#spring.session.timeout=600
spring.h2.console.enabled=true
#spring.main.allow-bean-definition-overriding=true
#spring.main.allow-circular-references =true