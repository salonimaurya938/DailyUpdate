<!doctype html>
<html lang="en" xmls:th="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">

<head>
	<meta charset="UTF-8" />
	<title>This is sign up page</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
		integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
	<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
		integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
		crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
		integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
		crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
		integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
		crossorigin="anonymous"></script>
</head>

<body>
	<section>
		<div class="container">
			<div class="row">
				<div class="col-md-12 ">
					<div class="my-card mt-2 radius">
						<div class="container text-center">
							<img style="width: 60px;" th:src="@{/img/membership.png}" alt="" />
						</div>
						<h1 class="text-center">Register Here...</h1>
						<form action="" th:action="@{/do_register}" method="post" th:object="${user}">
							<div class="row">
							<div class="col-sm-6 firstSecondPart">
								<div class="form-group">
									<label for="username">Student Name</label> <input type="text" required name="name"
										class="form-control" id="name"  aria-describedby="emailHelp"
										placeholder="Enter Student Name...">
								</div>
								<div class="form-group">
									<label for="emailAddress">Email address</label> <input type="email" required
										name="email" class="form-control" id="email" aria-describedby="emailHelp"
										placeholder="Enter email...">
								</div>
								<div class="form-group">
									<label for="password">Mobile</label> <input type="text" class="form-control"
										required name="mob" id="mob" aria-describedby="emailHelp"
										placeholder="Enter Mobile...">
								</div>
								<div class="form-group">
									<label for="username">Date of Birth</label> <input type="datetime" required
										name="dob" class="form-control" id="dob" aria-describedby="emailHelp"
									 	placeholder="Enter Date of Birth...">
								</div>
								<div class="form-group">
									<label for="username">Class</label> <input type="text" required name="class"
										class="form-control" id="class" aria-describedby="emailHelp"
										placeholder="Enter which class...">
								</div>
								<div class="form-group">
									<label for="username">Home Address</label> <input type="text" required
										name="address" class="form-control" id="address" aria-describedby="emailHelp"
										placeholder="Enter your Home Address...">
								</div>
								<div class="form-group">
									<label for="username">Medium</label> <input type="text" required name="name"
										class="form-control" id="name" aria-describedby="emailHelp"
										placeholder="Enter medium...">
								</div>
							</div>
							<div class="col-sm-6 firstSecondPart">
								<div class="form-group">
									<label for="username">Roll Number</label> <input type="text" required name="name"
										class="form-control" id="name" aria-describedby="emailHelp"
										placeholder="Enter your roll number...">
								</div>
								<div class="form-group">
									<label for="username">Height</label> <input type="text" required name="height"
										class="form-control" id="height" aria-describedby="emailHelp"
										placeholder="Enter your height...">
								</div>
								<div class="form-group">
									<label for="username">Weight</label> <input type="text" required name="wieght"
										class="form-control" id="weight" aria-describedby="emailHelp"
										placeholder="Enter your wight...">
									<div class="form-group">
										<label for="password">Password</label> <input type="password"
											class="form-control" required name="password" id="password"
											aria-describedby="emailHelp" placeholder="Enter your password...">
									</div>
									<div class="form-group">
										<label for="username">Class Id</label> <input type="text" required
											name="classid" class="form-control" id="classid"
											aria-describedby="emailHelp" placeholder="Enter your class id...">
									</div>
									<div class="form-group">
										<label for="username">Parent Id</label> <input type="text" required
											name="parentid" class="form-control" id="parentid"
											aria-describedby="emailHelp" placeholder="Enter your parent id...">
									</div>
									<div class="form-group form-check text-center">
										<input type="checkbox" name="agreement" required class="form-check-input" />
										<label class="agreemet">Accept
											terms and conditions </label>
									</div>
									<div class="container text-center">
										<button type="submit" class="btn bg-primary ">Submit</button>
										<button type="reset" class="btn bg-info  text-light">Reset</button>
									</div>
								</div>
								</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>

</html>
