<div xmls:th="http://www.thymeleaf.org" th:replace="admin/master::layout(~{::section})">
	<section>
		<main id="main" class="main">

			<div class="pagetitle">
				<h1>Admission Enquiry</h1>
				<nav>
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a href="adminDashBoard">Admin</a></li>
						<li class="breadcrumb-item">Student Result and Report Card</li>
						<li class="breadcrumb-item active">Admission Enquiry</li>
					</ol>
				</nav>
				<div class="col-sm-12">
					<div class="card">
						<div class="card-body">
							<h5 class="card-title">Admission Enquiry...</h5>

							<!-- Vertical Form -->
							<form class="row g-3" th:action="@{/admissionReport}" enctype="multipart/form-data"
								method="POST" th:Object="${admission}">
								<div class="col-sm-6">
									<div class="col-12">
										<label for="name" class="form-label">Full Name</label>
										<input type="text" name="name" class="form-control" id="name">
									</div>
									<div class="col-12">
										<label for="mob" class="form-label">Phone Number</label>
										<input type="text" name="mob" class="form-control" id="mob">
									</div>
									<div class="col-12">
										<label for="address" class="form-label">Address</label>
										<input type="text" name="address" class="form-control" id="address">
									</div>
									<div class="col-12">
										<label for="email" class="form-label">Email</label>
										<input type="text" name="email" class="form-control" id="email">
									</div>
									<div class="col-12">
										<label for="classes" class="form-label">Class</label>
										<input type="text" name="classes" class="form-control" id="classes">
									</div>
								</div>
								<div class="col-sm-6">									
									<div class="col-12">
										<label for="discription" class="form-label">Discription</label>
										<input type="text" name="discription" class="form-control" id="discription">
									</div>
									<div class="col-12">
										<label for="date" class="form-label">Date and Time</label>
										<input type="datetime-local" name="date" class="form-control" id="date">
									</div>
									<div class="col-12">
										<label for="assigned" class="form-label">Assigned</label>
										<input type="text" name="assigned" class="form-control" id="assigned">
									</div>
									<div class="col-12">
										<label for="reference" class="form-label">Reference</label>
										<input type="text" name="reference" class="form-control" id="reference">
									</div>
									<div class="col-12">
										<label for="source" class="form-label">Source</label>
										<input type="text" name="source" class="form-control" id="source">
									</div>
									<br>
								</div>
							     <div class="text-center" style="text-align: center;">
										<button type="submit" name="submit" class="btn btn-primary">Submit</button>
										<button type="reset" name="reset" class="btn btn-secondary">Reset</button>
										<button type="button" class="btn btn-success"><a href="viewAdmissionEnquiry"
												style="color: white;">Addmission Enquiry</a></button>
									</div>
							</form><!-- Vertical Form -->

						</div>
					</div>
				</div>
			</div><!-- End Page Title -->
		</main><!-- End #main -->
	</section>

</div>
