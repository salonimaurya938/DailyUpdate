<!DOCTYPE html>
<html>

<head>
	<meta charset="ISO-8859-1">
	<title>Insert title here</title>
</head>

<body <!-- Profile Edit Form -->
	<form th:action="@{/admin/updateProfile}" method="get" enctype="multipart/form-data" th:Object="${aupdate}">

		<input name="id" type="text" class="form-control" id="id" th:value="${id}">

		<div class="row mb-3">
			<label for="profileImage" class="col-md-4 col-lg-3 col-form-label">Profile Image</label>
			<div class="col-md-8 col-lg-9">
				<img src="assets/img/profile-img.jpg" alt="Profile">
				<div class="pt-2">
					<a href="#" class="btn btn-primary btn-sm" title="Upload new profile image"><i
							class="bi bi-upload"></i></a>
					<a href="#" class="btn btn-danger btn-sm" title="Remove my profile image"><i
							class="bi bi-trash"></i></a>
				</div>
			</div>
		</div>

		<div class="row mb-3">
			<label for="username" class="col-md-4 col-lg-3 col-form-label">User
				Name</label>
			<div class="col-md-8 col-lg-9">
				<input name="username" type="text" class="form-control" id="username" th:value="${username}">
			</div>
		</div>

		<div class="row mb-3">
			<label for="email" class="col-md-4 col-lg-3 col-form-label">Email</label>
			<div class="col-md-8 col-lg-9">
				<input name="email" type="email" class="form-control" id="email" th:value="${email}">
			</div>
		</div>
		<div class="text-center">
			<button type="submit" class="btn btn-primary">Save Changes</button>
		</div>
	</form><!-- End Profile Edit Form -->


</body>

</html>
