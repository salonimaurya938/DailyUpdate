<div xmls:th="http://www.thymeleaf.org" th:replace="admin/master::layout(~{::section})">

	<section>
		<main id="main" class="main">

			<div class="pagetitle">
				<h1>New Admission</h1>
				<nav>
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a href="adminDashBoard">Admin</a></li>
						<li class="breadcrumb-item">New Admission</li>
					</ol>
				</nav>

				<!-- Button trigger modal -->
				<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
					New Addmission+
				</button>

				<!-- Modal -->
				<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false"
					tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
					<div class="modal-dialog modal-fullscreen">
						<div class="modal-content">
							<div class="modal-header">
								<h5 class="modal-title" id="staticBackdropLabel">New Admission</h5>
								<button type="button" class="btn-close" data-bs-dismiss="modal"
									aria-label="Close"></button>
							</div>
							<div class="modal-body">
								<div class="container">
									<div class="row">
										<div class="col-md-12 ">
											<div class="my-card mt-2 radius">
												<form action="" th:action="@{/newAdmission}" method="post"
													th:object="${user}">
													<div class="row">
														<div class="col-sm-6 firstSecondPart">
															<div class="form-group">
																<label for="admissionNo">Admission NO</label> <input
																	type="text" required name="admissionNo"
																	class="form-control" id="admissionNo"
																	aria-describedby="emailHelp"
																	placeholder="Enter AdmissionNo...">
															</div>															
															<div class="form-group">
																<label for="name">Student Name</label> <input
																	type="text" required name="name"
																	class="form-control" id="name"
																	aria-describedby="emailHelp"
																	placeholder="Enter Student Name...">
															</div>															
															<div class="form-group">
																<label for="fname">Father Name</label> <input
																	type="text" required name="fname"
																	class="form-control" id="fname"
																	aria-describedby="emailHelp"
																	placeholder="Enter Student Name...">
															</div>
															<div class="form-group">
																<label for="mname">Mother Name</label> <input
																	type="text" required name="mname"
																	class="form-control" id="mname"
																	aria-describedby="emailHelp"
																	placeholder="Enter Student Name...">
															</div>
															<div class="form-group">
																<label for="mob">Mobile</label> <input type="text"
																	class="form-control" required name="mob" id="mob"
																	aria-describedby="emailHelp"
																	placeholder="Enter Mobile...">
															</div>
															<div class="form-group">
																<label for="username">Date of Birth</label> <input
																	type="datetime" required name="dob"
																	class="form-control" id="dob"
																	aria-describedby="emailHelp"
																	placeholder="Enter Date of Birth...">
															</div>
															<div class="form-group">
																<label for="classes">Class</label> <input type="text"
																	required name="classes" class="form-control"
																	id="class" aria-describedby="emailHelp"
																	placeholder="Enter which class...">
															</div>
															<div class="form-group">
																<label for="address">Home Address</label> <input
																	type="text" required name="address"
																	class="form-control" id="address"
																	aria-describedby="emailHelp"
																	placeholder="Enter your Home Address...">
															</div>
															<div class="form-group">
																<label for="emailAddress">Email address</label> <input
																	type="email" required name="email"
																	class="form-control" id="email"
																	aria-describedby="emailHelp"
																	placeholder="Enter email...">
															</div>
														</div>													
														
														
														
														<div class="col-sm-6 firstSecondPart">
															<div class="form-group">
																<label for="username">Police Station</label> <input
																	type="text" required name="name"
																	class="form-control" id="name"
																	aria-describedby="emailHelp"
																	placeholder="Enter your roll number...">
															</div>
															<div class="form-group">
																<label for="username">Post Office</label> <input type="text"
																	required name="height" class="form-control"
																	id="height" aria-describedby="emailHelp"
																	placeholder="Enter your height...">
															</div>
															<div class="form-group">
																<label for="username">District</label> <input type="text"
																	required name="wieght" class="form-control"
																	id="weight" aria-describedby="emailHelp"
																	placeholder="Enter your wight...">
																<div class="form-group">
																	<label for="password">State</label> <input
																		type="password" class="form-control" required
																		name="password" id="password"
																		aria-describedby="emailHelp"
																		placeholder="Enter your password...">
																</div>
																<div class="form-group">
																	<label for="username">pincode</label> <input
																		type="text" required name="classid"
																		class="form-control" id="classid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your class id...">
																</div>
																<div class="form-group">
																	<label for="username">Contact No</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																<div class="form-group">
																	<label for="username">AadharCard No</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																<div class="form-group">
																	<label for="username">Contact No</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																<div class="form-group">
																	<label for="username">Father Qulification</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																<div class="form-group">
																	<label for="username">Mother Qulification</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																<div class="form-group">
																	<label for="username">Father Occupation</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																<div class="form-group">
																	<label for="username">Mother Occupation</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																	<div class="form-group">
																	<label for="username">Local Guardian</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																	<div class="form-group">
																	<label for="username">Relation with students</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																	<div class="form-group">
																	<label for="username">Contact No</label> <input
																		type="text" required name="parentid"
																		class="form-control" id="parentid"
																		aria-describedby="emailHelp"
																		placeholder="Enter your parent id...">
																</div>
																
																<div class="form-group form-check text-center">
																	<input type="checkbox" name="agreement" required
																		class="form-check-input" />
																	<label class="agreemet">Accept
																		terms and conditions </label>
																</div>
																<div class="container text-center">
																	<button type="submit"
																		class="btn bg-primary ">Submit</button>
																	<button type="reset"
																		class="btn bg-info  text-light">Reset</button>
																	<button type="button" class="btn btn-secondary"
																		data-bs-dismiss="modal">Close</button>
																</div>
															</div>
														</div>
												</form>
											</div>
										</div>
									</div>
								</div>
							</div>

						</div>
					</div>
				</div>
			</div>
		</main>
	</section>

	<style>

	</style>
