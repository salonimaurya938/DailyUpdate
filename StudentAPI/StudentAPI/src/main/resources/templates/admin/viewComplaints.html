<div xmls:th="http://www.thymeleaf.org" th:replace="admin/master::layout(~{::section})">

	<section>
		<main id="main" class="main">
			<div class="pagetitle">
				<h1>View All Complaints</h1>
				<nav>
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a href="viewhomework">Admin</a></li>
						<li class="breadcrumb-item">Complaints</li>
					</ol>
				</nav>
			</div><!-- End Page Title -->
			<br>
			<div class="col-sm-12">
				<div class="card">
					<div class="card-body">
						<h5 class="card-title">All Student Complaints</h5>
						<table width="100%">
							<tr>
								<th>Id</th>
								<th>Complaints</th>
								<th>Action</th>
							</tr>
							<tr th:each="lists:${lists}">
								<td th:text="${lists.id}"></td>
								<td th:text="${lists.complaint}"></td>
								<td>
									<form th:action="@{/deleteComplaints/{id}}" method="post" th:object="${lists}">
											<input type="hidden" th:value="${lists.id}" name="id" />
										<button type="submit" value="Submit" class="btn btn-danger" style="height: 30px; text-align: center;">Delete</button>
									</form>
								</td>
							</tr>
						</table>

					</div>
				</div>
			</div>
</div><!-- End Page Title -->

</main><!-- End #main -->
</section>
</div>

<style>
	button {
		border-radius: 5px;
		color: white;
		border: none;
	}
</style>
