<html lang="en" xmls:th="http://www.thymeleaf.org" th:replace="master::layout(~{::section})">
<body>
	<section>
		<div class="container">
			<div class="row">
				<div class="col-md-12 ">
					<div class="my-card mt-2 radius">
						<div class="container text-center">
							<img style="width: 60px;" th:src="@{/img/membership.png}" alt="" />
						</div>
						<h1 class="text-center">Register Here...</h1>
						<form action="" th:action="@{/do_register}" method="post" th:object="${user}">
							<div class="row">
								<div class="col-sm-6 firstSecondPart">
									<img  th:src="@{/img/child.jpg}" style="border-radius: 10px;"  height="400px" width="100%" alt=" ">
								</div>
								<div class="col-sm-6">
									<div class="form-group">
										<label for="username">Student Name</label> <input type="text" required
											name="name" class="form-control" id="name" aria-describedby="emailHelp"
											placeholder="Enter Student Name...">
									</div>
									<div class="form-group">
										<label for="emailAddress">Email address</label> <input type="email" required
											name="email" class="form-control" id="email" aria-describedby="emailHelp"
											placeholder="Enter email...">
									</div>
									<div class="form-group">
										<label for="password">Password</label> <input type="text" class="form-control"
											required name="mob" id="mob" aria-describedby="emailHelp"
											placeholder="Enter Mobile...">
									</div>
									<div class="form-group">
										<label for="username">Address</label> <input type="datetime" required name="dob"
											class="form-control" id="dob" aria-describedby="emailHelp"
											placeholder="Enter Date of Birth...">
									</div>
									<div class="container text-center">
										<button type="submit" class="btn bg-primary ">Submit</button>
										<button type="reset" class="btn bg-info  text-light">Reset</button>
									</div>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>

</html>
