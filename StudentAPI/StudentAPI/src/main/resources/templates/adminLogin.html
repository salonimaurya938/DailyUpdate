<!doctype html>
<html lang="en" xmls:th="http://www.thymeleaf.org"
	th:replace="base::layout(~{::section})">
<head>
<meta charset="UTF-8" />
<title>Admin login page</title>
</head>
<body>
	<section>
		<div class="container">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="my-card mt-5 radius">
						<div class="container text-center">
							<img style="width: 60px;" th:src="@{/img/key.png}" alt="" />
						</div>
						<h1 class="text-center">Login here...</h1>
						<form action="" th:action="@{/login}" method="post">
							<div class="form-group">
								<label for="emailAddress">Username</label> <input
									type="text" required name="username" class="form-control"
									id="username" aria-describedby="emailHelp"
									placeholder="Enter email...">
							</div>
							<div class="form-group">
								<label for="password">Password</label> <input type="password"
									class="form-control" required name="password" id="password"
									aria-describedby="emailHelp" placeholder="Enter password...">
							</div>
							<div class="container text-center">
								<button type="submit" class="btn bg-primary ">Submit</button>
								<button type="reset" class="btn bg-info  text-light">Reset</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
		<!-------------------------------------- end login code ----------------------------------->

	</section>
</body>
</html>
